apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-report
  namespace: lab10
spec:
  schedule: "0 2 * * *"
  timeZone: "Asia/Karachi"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: report
            image: busybox:1.36
            command: ["/bin/sh", "-c"]
            args:
              - echo "report generated $(date)"
