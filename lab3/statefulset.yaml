apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db              # Name of the StatefulSet
  namespace: lab3
spec:
  serviceName: db-svc   # REQUIRED. Must match the headless Service name below.
                        # Enables stable DNS per pod: db-0.db-svc.lab3.svc.cluster.local
  replicas: 2           # Creates db-0 and db-1 in order. db-0 starts first.
  selector:
    matchLabels:
      app: db           # Manages pods with this label
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: busybox:1.36     # Simple image. In production this would be postgres:16
        command:
        - sh
        - -c
        - |
          echo "Pod $POD_NAME started" >> /data/log.txt
          echo "Timestamp: $(date)" >> /data/log.txt
          while true; do sleep 30; done    # Keep pod alive
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name     # Injects the pod's own name as env var
        volumeMounts:
        - name: data              # Must match volumeClaimTemplates name below
          mountPath: /data        # Path inside the container where storage is mounted
  volumeClaimTemplates:           # This is what makes StatefulSet different from Deployment
  - metadata:
      name: data                  # Name referenced in volumeMounts above
    spec:
      accessModes:
      - ReadWriteOnce             # One pod reads/writes at a time (standard for databases)
      resources:
        requests:
          storage: 100Mi          # Request 100MB of storage for each pod
      storageClassName: local-path  # Use k3d's local-path provisioner
