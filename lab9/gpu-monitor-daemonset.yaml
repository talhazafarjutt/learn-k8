apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-monitor
  namespace: lab9
spec:
  selector:
    matchLabels:
      app: gpu-monitor
  template:
    metadata:
      labels:
        app: gpu-monitor
    spec:
      nodeSelector:
        gpu: "true"             # ONLY schedule on nodes with this label
      containers:
      - name: monitor
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "GPU monitor running on $NODE_NAME"
          while true; do sleep 30; done
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
