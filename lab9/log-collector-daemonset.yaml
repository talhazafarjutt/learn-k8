apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: lab9
spec:
  selector:
    matchLabels:
      app: log-collector      # DaemonSet manages pods with this label
  updateStrategy:
    type: RollingUpdate       # update pods one node at a time
    rollingUpdate:
      maxUnavailable: 1       # at most 1 pod down during update
  template:
    metadata:
      labels:
        app: log-collector    # must match selector above
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule    # run on control-plane node too
      containers:
      - name: collector
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Log collector started on node: $NODE_NAME"
          while true; do
            echo "$(date) collecting logs from $NODE_NAME"
            ls /host-log/ 2>/dev/null | head -5
            sleep 20
          done
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName   # injects the node name this pod runs on
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        volumeMounts:
        - name: host-log
          mountPath: /host-log          # node's /var/log visible here inside container
          readOnly: true
      volumes:
      - name: host-log
        hostPath:
          path: /var/log                # mount the NODE's /var/log, not the pod's
          type: Directory
