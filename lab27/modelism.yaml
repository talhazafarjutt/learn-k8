apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelsim
  namespace: lab27
  labels: { app: modelsim }
spec:
  replicas: 1
  selector:
    matchLabels: { app: modelsim }
  template:
    metadata:
      labels: { app: modelsim }
    spec:
      containers:
        - name: model
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "starting model server"
              sleep 25
              echo "loading model weights into memory"
              tail /dev/zero
          resources:
            requests: { memory: 32Mi, cpu: 50m }
            limits:   { memory: 64Mi, cpu: 200m }
---
apiVersion: v1
kind: Service
metadata:
  name: modelsim
  namespace: lab27
spec:
  selector: { app: modelsim }
  ports:
    - { port: 8080, targetPort: 8080 }
