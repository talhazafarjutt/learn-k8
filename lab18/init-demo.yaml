apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  namespace: lab18
spec:
  volumes:
  - name: weights
    emptyDir: {}

  initContainers:
  - name: download-weights
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "[init] starting download $(date +%T)"
      sleep 10
      echo "FAKE_MODEL_WEIGHTS" > /weights/model.bin
      echo "[init] done $(date +%T)"
    volumeMounts:
    - { name: weights, mountPath: /weights }

  containers:
  - name: app
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "[main] started at $(date +%T)"
      echo "[main] reading weights:"
      cat /weights/model.bin
      sleep 3600
    volumeMounts:
    - { name: weights, mountPath: /weights }
