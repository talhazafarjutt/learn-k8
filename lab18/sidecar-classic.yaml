apiVersion: v1
kind: Pod
metadata:
  name: sidecar-classic
  namespace: lab18
spec:
  volumes:
  - name: shared
    emptyDir: {}
  containers:
  - name: writer
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      i=0
      while true; do
        echo "$(date +%T) line $i" >> /shared/app.log
        i=$((i+1))
        sleep 3
      done
    volumeMounts:
    - { name: shared, mountPath: /shared }

  - name: reader
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args: ["sleep 2; tail -F /shared/app.log"]
    volumeMounts:
    - { name: shared, mountPath: /shared }
