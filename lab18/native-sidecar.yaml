apiVersion: v1
kind: Pod
metadata:
  name: sidecar-native
  namespace: lab18
spec:
  volumes:
  - name: shared
    emptyDir: {}

  initContainers:
  - name: log-shipper
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    restartPolicy: Always            # <-- this is the line that makes it a sidecar
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "[sidecar] starting at $(date +%T)"
      touch /shared/app.log
      tail -F /shared/app.log
    volumeMounts:
    - { name: shared, mountPath: /shared }

  containers:
  - name: main
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      i=0
      while true; do
        echo "$(date +%T) line $i" >> /shared/app.log
        i=$((i+1))
        sleep 3
      done
    volumeMounts:
    - { name: shared, mountPath: /shared }
