apiVersion: apps/v1
kind: Deployment
metadata: { name: ready-demo, namespace: lab11 }
spec:
  replicas: 2
  selector:
    matchLabels: { app: ready-demo }
  template:
    metadata:
      labels: { app: ready-demo }
    spec:
      containers:
      - name: app
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        args: ["/bin/sh", "-c", "touch /tmp/ready; sleep 3600"]
        ports:
        - containerPort: 5678
        readinessProbe:
          exec: { command: ["cat", "/tmp/ready"] }
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata: { name: ready-svc, namespace: lab11 }
spec:
  selector: { app: ready-demo }
  ports:
  - port: 80
    targetPort: 5678
