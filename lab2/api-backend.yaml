# Backend 1: Simulates your AI API service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: lab2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
      - name: api
        image: hashicorp/http-echo:latest
        args:
        - "-text=AI API RESPONSE — pod: $(POD_NAME)"
        - "-listen=:5678"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: lab2
spec:
  selector:
    app: api-backend
  ports:
  - port: 80
    targetPort: 5678
---
# Backend 2: Simulates your web dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: lab2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo:latest
        args:
        - "-text=WEB FRONTEND — pod: $(POD_NAME)"
        - "-listen=:5678"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: lab2
spec:
  selector:
    app: web-frontend
  ports:
  - port: 80
    targetPort: 5678
