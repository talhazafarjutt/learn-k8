apiVersion: apps/v1
kind: Deployment
metadata: { name: vllm-spread, namespace: lab17 }
spec:
  replicas: 2
  selector: { matchLabels: { app: vllm-spread } }
  template:
    metadata: { labels: { app: vllm-spread } }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - { key: gpu, operator: In, values: [v100] }
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - { key: app, operator: In, values: [vllm-spread] }
            topologyKey: kubernetes.io/hostname
      containers:
      - name: app
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["sleep", "3600"]
