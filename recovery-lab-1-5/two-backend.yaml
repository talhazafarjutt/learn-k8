apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-backend
  namespace: recovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mixed-backend
  template:
    metadata:
      labels:
        app: mixed-backend
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /www && echo 'SUCCESS pod' > /www/index.html && httpd -f -p 5678 -h /www"]
        ports:
        - containerPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-backend
  namespace: recovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mixed-backend
  template:
    metadata:
      labels:
        app: mixed-backend
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /www && echo 'BROKEN pod' > /www/index.html && httpd -f -p 9999 -h /www"]
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: mixed-svc
  namespace: recovery
spec:
  selector:
    app: mixed-backend
  ports:
  - port: 80
    targetPort: 5678
