apiVersion: v1
kind: Pod
metadata:
  name: mem-stress
  namespace: recovery
spec:
  containers:
  - name: stress
    image: busybox:1.36
    command: ["sh", "-c", "dd if=/dev/zero of=/dev/shm/fill bs=1M; sleep 1"]
    resources:
      requests:
        memory: "32Mi"
      limits:
        memory: "32Mi"
