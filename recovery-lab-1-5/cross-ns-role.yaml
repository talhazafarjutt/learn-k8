apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-sa
  namespace: recovery
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: recovery
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-binding
  namespace: recovery
subjects:
- kind: ServiceAccount
  name: test-sa
  namespace: recovery
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
