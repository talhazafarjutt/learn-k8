apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: lab25
spec:
  replicas: 1
  selector:
    matchLabels: { app: jaeger }
  template:
    metadata:
      labels: { app: jaeger }
    spec:
      containers:
        - name: jaeger
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
          imagePullPolicy: IfNotPresent
          env:
            - name: JAEGER_LISTEN_HOST
              value: "0.0.0.0"          # bind on the pod IP, not localhost.
          ports:
            - containerPort: 16686      # UI
            - containerPort: 4317       # OTLP gRPC in
            - containerPort: 4318       # OTLP HTTP in
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: lab25
spec:
  selector: { app: jaeger }
  ports:
    - { name: ui,        port: 16686, targetPort: 16686 }
    - { name: otlp-grpc, port: 4317,  targetPort: 4317 }
    - { name: otlp-http, port: 4318,  targetPort: 4318 }
