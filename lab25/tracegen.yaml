apiVersion: batch/v1
kind: Job
metadata:
  name: tracegen
  namespace: lab25
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: telemetrygen
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
          imagePullPolicy: IfNotPresent
          args:
            - traces
            - --otlp-endpoint=jaeger.lab25:4317
            - --otlp-insecure
            - --traces=20
            - --child-spans=4
            - --service=codsy-api
            - --span-duration=200ms
            - --status-code=Ok
