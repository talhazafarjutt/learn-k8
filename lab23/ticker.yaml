apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticker
  namespace: lab22
spec:
  replicas: 1
  selector:
    matchLabels: { app: ticker }
  template:
    metadata:
      labels: { app: ticker }
    spec:
      containers:
        - name: web
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              i=0
              while true; do
                i=$((i+1))
                printf '# TYPE ticks_total counter\nticks_total %s\n' "$i" > /www/metrics
                sleep 2
              done &
              httpd -f -p 8080 -h /www

