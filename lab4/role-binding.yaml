apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding               # Connects a Role to a ServiceAccount
metadata:
  name: model-discovery-binding
  namespace: lab4
subjects:                       # WHO gets the permissions
  - kind: ServiceAccount
    name: model-discovery-sa    # Must match ServiceAccount name above
    namespace: lab4
roleRef:                        # WHAT permissions they get
  kind: Role
  name: pod-reader-role         # Must match Role name above
  apiGroup: rbac.authorization.k8s.io
