apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: lab19
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels: { app: myapp }
  template:
    metadata:
      labels: { app: myapp, version: v1 }
    spec:
      containers:
      - name: app
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "touch /tmp/ready; sleep 3600"]
        readinessProbe:
          exec: { command: ["cat", "/tmp/ready"] }
          periodSeconds: 3
          failureThreshold: 2
