deploymentMode: SingleBinary        # legacy chart enum. "Monolithic" belongs to the
                                    # grafana-community chart v12+, not this repo.

loki:
  auth_enabled: false               # single tenant. left true -> every push/query needs a
                                    # tenant header and fails with "no org id".
  image:
    tag: "3.5.0"                    # pin to the image already pulled on all 3 nodes,
                                    # so loki-0 never pulls a different default tag.
  commonConfig:
    replication_factor: 1           # mandatory pairing with 1 replica or writes fail.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    allow_structured_metadata: true # required pairing with schema v13.
    retention_period: 168h
  storage:
    type: filesystem

singleBinary:
  replicas: 1

# the exact cause of your error: this chart defaults these to 3.
# validate.yaml refuses singleBinary>0 AND scalable-targets>0. zero them.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false                    # skips the nginx gateway image; Grafana and Alloy
                                    # already target loki.lab24.svc.cluster.local:3100 directly.
minio:
  enabled: false
chunksCache:
  enabled: false                    # the ~9GB memcached request that never schedules on k3d.
resultsCache:
  enabled: false
lokiCanary:
  enabled: false                    # canary image not pre-pulled; not needed for the lab.
test:
  enabled: false                    # helm test requires the canary; disable as a pair.
sidecar:
  rules:
    enabled: false                  # drops the rules-sidecar container so loki-0 runs 1/1
                                    # with zero extra image pulls. Lab 26 alerts use
                                    # Prometheus rules, not the Loki ruler.
