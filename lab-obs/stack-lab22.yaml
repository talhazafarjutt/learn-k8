apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: lab22
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'ticker'
        static_configs:
          - targets: ['ticker:8080']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticker
  namespace: lab22
spec:
  replicas: 1
  selector:
    matchLabels: { app: ticker }
  template:
    metadata:
      labels: { app: ticker }
    spec:
      containers:
        - name: web
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              i=0
              while true; do
                i=$((i+1))
                printf '# TYPE ticks_total counter\nticks_total %s\n' "$i" > /www/metrics
                sleep 2
              done &
              httpd -f -p 8080 -h /www
---
apiVersion: v1
kind: Service
metadata:
  name: ticker
  namespace: lab22
spec:
  selector: { app: ticker }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: lab22
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prom-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: lab22
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
