apiVersion: apps/v1
kind: Deployment
metadata:
  name: sink
  namespace: lab26
spec:
  replicas: 1
  selector:
    matchLabels: { app: sink }
  template:
    metadata:
      labels: { app: sink }
    spec:
      containers:
        - name: sink
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              while true; do
                printf 'HTTP/1.1 200 OK\r\nContent-Length: 0\r\nConnection: close\r\n\r\n' | nc -l -p 8080
              done
          # nc -l -p 8080 = listen once on 8080; it prints the incoming request
          # (the alert JSON) to stdout and replies with the piped 200 OK.
          # the while-loop re-opens the listener after each request.
---
apiVersion: v1
kind: Service
metadata:
  name: sink
  namespace: lab26
spec:
  selector: { app: sink }
  ports:
    - port: 8080
      targetPort: 8080
