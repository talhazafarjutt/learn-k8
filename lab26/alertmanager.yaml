apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: lab26
data:
  alertmanager.yml: |
    route:
      receiver: webhook-sink
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 2m
    receivers:
      - name: webhook-sink
        webhook_configs:
          - url: 'http://sink.lab26:8080/'
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: lab26
spec:
  replicas: 1
  selector:
    matchLabels: { app: alertmanager }
  template:
    metadata:
      labels: { app: alertmanager }
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"      # where it keeps silences; args replace the
                                                  # image's defaults, so both flags must be here.
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}          # recall Lab 18: emptyDir = scratch space that lives and
                                # dies with the pod. Fine for silences in a lab.
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: lab26
spec:
  selector: { app: alertmanager }
  ports:
    - port: 9093
      targetPort: 9093
